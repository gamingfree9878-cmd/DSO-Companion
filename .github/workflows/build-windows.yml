name: Windows EXE erstellen

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-windows:
    name: DSO Companion bauen
    runs-on: windows-latest

    steps:
      - name: Projekt herunterladen
        uses: actions/checkout@v4

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Projekt wiederherstellen
        run: dotnet restore DSOCompanion.csproj

      - name: Projekt prüfen
        run: dotnet build DSOCompanion.csproj --configuration Release --no-restore

      - name: Portable Windows-EXE erstellen
        run: >
          dotnet publish DSOCompanion.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output publish

      - name: Download-Paket erstellen
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "publish\DSO Companion.exe" "package\DSO Companion.exe"
          Copy-Item "README.txt" "package\README.txt"
          Compress-Archive -Path "package\*" -DestinationPath "DSO-Companion-Windows.zip" -Force

      - name: EXE als GitHub-Download hochladen
        uses: actions/upload-artifact@v4
        with:
          name: DSO-Companion-Windows
          path: DSO-Companion-Windows.zip
          if-no-files-found: error
          retention-days: 30
