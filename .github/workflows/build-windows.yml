name: Windows EXE erstellen

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Quellcode herunterladen
        uses: actions/checkout@v4

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Projekt wiederherstellen
        run: dotnet restore DSOCompanion.csproj --runtime win-x64

      - name: Projekt kompilieren
        run: dotnet build DSOCompanion.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Portable EXE erstellen
        run: >
          dotnet publish DSOCompanion.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish

      - name: Download-Paket erstellen
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "publish\DSO Companion.exe" "package\DSO Companion.exe"
          Copy-Item "README.md" "package\README.md"
          Compress-Archive -Path "package\*" -DestinationPath "DSO-Companion-Windows.zip" -Force

      - name: Windows-Version hochladen
        uses: actions/upload-artifact@v4
        with:
          name: DSO-Companion-Windows
          path: DSO-Companion-Windows.zip
          if-no-files-found: error
          retention-days: 30
