name: GitHub Release erstellen

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Projekt herunterladen
        uses: actions/checkout@v4

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Projekt wiederherstellen
        run: dotnet restore DSOCompanion.csproj

      - name: Portable Windows-EXE erstellen
        run: >
          dotnet publish DSOCompanion.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output publish

      - name: Release-Paket erstellen
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "publish\DSO Companion.exe" "package\DSO Companion.exe"
          Copy-Item "README.txt" "package\README.txt"
          Compress-Archive -Path "package\*" -DestinationPath "DSO-Companion-${{ github.ref_name }}.zip" -Force

      - name: GitHub-Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          files: DSO-Companion-${{ github.ref_name }}.zip
          generate_release_notes: true
